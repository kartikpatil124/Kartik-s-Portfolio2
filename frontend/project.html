<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Projects | Kartik Patil</title>
    <meta name="description"
        content="Browse all web development projects by Kartik Patil - HTML, CSS, JavaScript, React, and Node.js projects.">
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/projects.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=Instrument+Serif:ital@0;1&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
        integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-custom glass-card">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Kartik Patil</a>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/project.html">Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="/contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Bottom Navigation Bar for Mobile -->
    <nav class="bottom-nav">
        <a href="/index.html" class="bottom-nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        <a href="/about.html" class="bottom-nav-item">
            <i class="fa-solid fa-user"></i>
            <span>About</span>
        </a>
        <a href="/project.html" class="bottom-nav-item active">
            <i class="fa-solid fa-briefcase"></i>
            <span>Projects</span>
        </a>
        <a href="/contact.html" class="bottom-nav-item">
            <i class="fa-solid fa-envelope"></i>
            <span>Contact</span>
        </a>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="hero-section">
        <div class="container">
            <div class="row align-items-center min-vh-100">
                <div class="col-lg-6">
                    <h1 class="display-4 fw-bold text-white mb-4">Welcome to Kartik Patil Projects</h1>
                    <p class="lead text-white mb-4">Showcasing amazing web development projects across various
                        technologies</p>
                    <a href="#projects" class="btn btn-outline-light text-secondary  btn-lg">View Projects</a>
                </div>
            </div>
        </div>
    </section>

    <!-- Projects Section -->
    <section id="projects" class="projects-section py-5">
        <div class="container">
            <h2 class="text-center mb-5 section-title">My Projects</h2>

            <!-- Category Filters -->
            <div class="filter-container">
                <button class="btn-filter active" data-category="all">All</button>
                <button class="btn-filter" data-category="html">HTML</button>
                <button class="btn-filter" data-category="css">CSS & Bootstrap</button>
                <button class="btn-filter" data-category="javascript">JavaScript</button>
                <button class="btn-filter" data-category="react">ReactJS</button>
                <button class="btn-filter" data-category="node">Node.JS</button>
            </div>

            <!-- Search Bar -->
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="projectSearch" class="search-input" placeholder="Search projects by name...">
            </div>

            <!-- Projects Grid -->
            <div id="projectsGrid" class="row g-4">
                <!-- Projects will be loaded here dynamically -->
            </div>
        </div>
    </section>

    <!-- Login Modal -->
    <div class="modal fade" id="loginModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Admin Login</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" required>
                        </div>
                        <div class="alert alert-danger d-none" id="loginError"></div>
                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>
                    <div class="mt-3 text-center">
                        <!-- <small class="text-muted">Default credentials: admin@gmail.com / admin123</small> -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="cursor"></div>
    <div class="cursor-follower"></div>
    <div class="noise-overlay"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/js/script.js"></script>
    <script type="module" src="/js/ks.js"></script> <!-- Link to shared JS -->

    <script>
        document.getElementById("loginForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {
                const response = await fetch("https://portfolio-backend1-0061.onrender.com/api/admin/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (result.success) {
                    window.location.href = "admin.html";   // redirect to admin panel
                } else {
                    document.getElementById("loginError").classList.remove("d-none");
                    document.getElementById("loginError").innerText = result.message;
                }
            } catch (error) {
                alert("Server error. Check backend.");
            }
        });
    </script>

  <a href="admin.html" class="admin-fab" aria-label="Admin Login">
    <i class="fas fa-lock"></i>
  </a>
</body>

</html>
